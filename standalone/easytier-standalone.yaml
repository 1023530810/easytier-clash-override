proxies:
  - name: Proxy-EasyTier
    type: wireguard
    server: YOUR_VPS_IP
    port: 11013
    ip: 10.14.14.3          # ← 第三台设备（standalone 配置）
    private-key: YOUR_PRIVATE_KEY
    public-key: YOUR_PUBLIC_KEY
    udp: true
    mtu: 1380
    persistent-keepalive: 25
    # 获取密钥：docker exec -it easytier easytier-cli vpn-portal
    # 每台设备需使用不同 IP，如 10.14.14.1 / .2 / .3

  # 你的翻墙代理（示例，替换成你自己的）
  # - name: 我的代理
  #   type: vmess
  #   server: your-server.com
  #   port: 443
  #   uuid: your-uuid
  #   alterId: 0
  #   cipher: auto

proxy-groups:
  - name: 🦊 EasyTier内网
    type: select
    proxies:
      - Proxy-EasyTier

  - name: 🚀 节点选择
    type: select
    proxies:
      - DIRECT
      # - 我的代理

  - name: 🎯 直连
    type: select
    proxies:
      - DIRECT

rules:
  - IP-CIDR,10.126.126.0/24,🦊 EasyTier内网,no-resolve
  - GEOIP,CN,🎯 直连
  - MATCH,🚀 节点选择
