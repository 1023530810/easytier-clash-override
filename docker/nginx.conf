# EasyTier HTTP 服务反向代理
#
# 解决问题：通过 SOCKS5 访问 EasyTier 内网 HTTP 服务时，每个请求都要
# 走完整的 SOCKS5 握手 + TCP 握手，Web 页面加载几十个资源后延迟叠加，
# 导致卡到无法使用。
#
# 解决方式：nginx 直接通过 EasyTier TUN 接口访问内网设备，连接保持复用，
# 手机/电脑直接访问 VPS_IP:端口 即可，无需 Clash 介入。
#
# 使用方法：
#   在 upstream 和 server 块中添加需要代理的端口，然后 docker compose up -d
#
# 添加新端口示例：
#   1. 新增 upstream：upstream my_service { server 10.126.126.X:PORT; keepalive 16; }
#   2. 新增 server：server { listen PORT; ... proxy_pass http://my_service; }

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---- WebSocket 连接升级映射 ----
    # 普通 HTTP 请求：Connection 为空（启用 upstream keepalive）
    # WebSocket 请求：Connection 为 upgrade
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    # ---- upstream 定义 ----
    # keepalive：到内网设备的持久连接数，避免每次请求重新握手

    # MAC-MINI 端口 6185
    upstream macmini_6185 {
        server 10.126.126.3:6185;
        keepalive 16;
    }

    # MAC-MINI 端口 23000
    upstream macmini_23000 {
        server 10.126.126.3:23000;
        keepalive 16;
    }

    # ---- server 定义 ----

    server {
        listen 6185;

        location / {
            proxy_pass http://macmini_6185;
            proxy_http_version 1.1;

            # 请求头
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket + keepalive
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # 超时（WebSocket 长连接需要较长 read timeout）
            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    server {
        listen 23000;

        location / {
            proxy_pass http://macmini_23000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 10s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
