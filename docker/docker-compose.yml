services:
  # ========== EasyTier 组网节点 ==========
  easytier:
    image: easytier/easytier:latest
    container_name: easytier
    hostname: vps-gateway
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data:/root
      - /etc/machine-id:/etc/machine-id:ro
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - .env
    depends_on:
      - easytier-web
    command: >
      -w udp://127.0.0.1:22020/${ET_WEB_USERNAME}
      --hostname vps-gateway
      --machine-id vps-gateway

  # ========== EasyTier Web 控制台（自建） ==========
  easytier-web:
    image: easytier/easytier:latest
    container_name: easytier-web
    restart: unless-stopped
    entrypoint: easytier-web-embed
    command: >
      --api-host http://YOUR_VPS_IP:11211
    ports:
      - "11211:11211"       # Web 管理界面（HTTP）
      - "22020:22020/udp"   # 配置下发服务（供 easytier-core 连接）
    volumes:
      - ./web-data:/app     # 持久化数据（账号、配置等）
    environment:
      - TZ=Asia/Shanghai

